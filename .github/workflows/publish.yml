name: Publish to Maven Central

# Автопубликация при заливке в master.
# Деплой пропускается, если текущая версия из pom.xml уже есть на Maven Central
# (иначе Central отклонит дубликат) — то есть публикуется только когда версию подняли.
on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          # settings.xml с сервером id=central (его же ждёт central-publishing-maven-plugin)
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          # импорт приватного GPG-ключа и настройка passphrase для maven-gpg-plugin
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve project version
        id: version
        run: echo "value=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)" >> "$GITHUB_OUTPUT"

      - name: Check if version already on Maven Central
        id: check
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          URL="https://repo1.maven.org/maven2/io/github/aarondeluna/agentic-cli-runner/${VERSION}/"
          if curl -s -o /dev/null -w '%{http_code}' "$URL" | grep -q '^200$'; then
            echo "Версия ${VERSION} уже опубликована — деплой пропускаем."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Версия ${VERSION} новая — публикуем."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Maven Central
        if: steps.check.outputs.exists == 'false'
        run: mvn --batch-mode --no-transfer-progress clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
